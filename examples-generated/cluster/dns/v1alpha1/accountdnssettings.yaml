apiVersion: dns.cloudflare.crossplane.io/v1alpha1
kind: AccountDNSSettings
metadata:
  annotations:
    meta.upbound.io/example-id: dns/v1alpha1/accountdnssettings
  labels:
    testing.upbound.io/example-name: example_account_dns_settings
  name: example-account-dns-settings
spec:
  forProvider:
    accountIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    zoneDefaults:
      flattenAllCnames: false
      foundationDns: false
      internalDns:
        referenceZoneId: reference_zone_id
      multiProvider: false
      nameservers:
        type: cloudflare.standard
      nsTtl: 86400
      secondaryOverrides: false
      soa:
        expire: 604800
        minTtl: 1800
        mname: kristina.ns.cloudflare.com
        refresh: 10000
        retry: 2400
        rname: admin.example.com
        ttl: 3600
      zoneMode: dns_only
