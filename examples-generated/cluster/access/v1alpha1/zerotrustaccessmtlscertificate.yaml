apiVersion: access.cloudflare.crossplane.io/v1alpha1
kind: ZeroTrustAccessMTLSCertificate
metadata:
  annotations:
    meta.upbound.io/example-id: access/v1alpha1/zerotrustaccessmtlscertificate
  labels:
    testing.upbound.io/example-name: example_zero_trust_access_mtls_certificate
  name: example-zero-trust-access-mtls-certificate
spec:
  forProvider:
    associatedHostnames:
    - admin.example.com
    certificate: |2
        -----BEGIN CERTIFICATE-----
        MIIGAjCCA+qgAwIBAgIJAI7kymlF7CWT...N4RI7KKB7nikiuUf8vhULKy5IX10
        DrUtmu/B
        -----END CERTIFICATE-----
    name: Allow devs
    zoneIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
