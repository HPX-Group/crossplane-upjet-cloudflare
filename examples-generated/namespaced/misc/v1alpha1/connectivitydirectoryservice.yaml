apiVersion: misc.cloudflare.m.cloudflare.com/v1alpha1
kind: ConnectivityDirectoryService
metadata:
  annotations:
    meta.upbound.io/example-id: misc/v1alpha1/connectivitydirectoryservice
  labels:
    testing.upbound.io/example-name: example_connectivity_directory_service
  name: example-connectivity-directory-service
  namespace: crossplane-system
spec:
  forProvider:
    accountIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    host:
      hostname: api.example.com
      resolverNetwork:
        resolverIps:
        - string
        tunnelId: 0191dce4-9ab4-7fce-b660-8e5dec5172da
    httpPort: 8080
    httpsPort: 8443
    name: web-server
    type: http
