apiVersion: misc.cloudflare.m.cloudflare.com/v1alpha1
kind: ImageVariant
metadata:
  annotations:
    meta.upbound.io/example-id: misc/v1alpha1/imagevariant
  labels:
    testing.upbound.io/example-name: example_image_variant
  name: example-image-variant
  namespace: crossplane-system
spec:
  forProvider:
    accountIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    neverRequireSignedUrls: true
    options:
      fit: scale-down
      height: 768
      metadata: none
      width: 1366
